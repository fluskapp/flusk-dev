name: DesignSystem
type: design
description: Complete design system with colors, typography, spacing, and components

# Color Palette
colors:
  primary:
    50: "#f0f9ff"
    100: "#e0f2fe" 
    200: "#bae6fd"
    300: "#7dd3fc"
    400: "#38bdf8"
    500: "#0ea5e9"  # Main brand
    600: "#0284c7"
    700: "#0369a1"
    800: "#075985"
    900: "#0c4a6e"
  
  secondary:
    50: "#f8fafc"
    100: "#f1f5f9"
    200: "#e2e8f0"
    300: "#cbd5e1"
    400: "#94a3b8"
    500: "#64748b"
    600: "#475569"
    700: "#334155"
    800: "#1e293b"
    900: "#0f172a"
  
  success:
    50: "#f0fdf4"
    500: "#22c55e"
    600: "#16a34a"
  
  warning:
    50: "#fffbeb"  
    500: "#f59e0b"
    600: "#d97706"
  
  danger:
    50: "#fef2f2"
    500: "#ef4444"
    600: "#dc2626"
  
  info:
    50: "#eff6ff"
    500: "#3b82f6"
    600: "#2563eb"

# Typography
typography:
  fonts:
    sans: ["Inter", "system-ui", "sans-serif"]
    mono: ["JetBrains Mono", "monospace"]
  
  sizes:
    xs: "0.75rem"     # 12px
    sm: "0.875rem"    # 14px  
    base: "1rem"      # 16px
    lg: "1.125rem"    # 18px
    xl: "1.25rem"     # 20px
    "2xl": "1.5rem"   # 24px
    "3xl": "1.875rem" # 30px
    "4xl": "2.25rem"  # 36px
    "5xl": "3rem"     # 48px
  
  weights:
    light: 300
    normal: 400
    medium: 500
    semibold: 600
    bold: 700

# Spacing System
spacing:
  xs: "0.25rem"   # 4px
  sm: "0.5rem"    # 8px
  md: "1rem"      # 16px
  lg: "1.5rem"    # 24px
  xl: "2rem"      # 32px
  "2xl": "3rem"   # 48px
  "3xl": "4rem"   # 64px
  "4xl": "6rem"   # 96px

# Border Radius
radius:
  none: "0"
  sm: "0.125rem"   # 2px
  base: "0.25rem"  # 4px
  md: "0.375rem"   # 6px
  lg: "0.5rem"     # 8px
  xl: "0.75rem"    # 12px
  "2xl": "1rem"    # 16px
  full: "9999px"

# Shadows
shadows:
  sm: "0 1px 2px 0 rgb(0 0 0 / 0.05)"
  base: "0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1)"
  md: "0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1)"
  lg: "0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1)"
  xl: "0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1)"

# Component Variants
components:
  button:
    variants:
      primary:
        background: "primary.500"
        color: "white"
        hover_background: "primary.600"
        focus_ring: "primary.500"
      
      secondary:
        background: "secondary.100"  
        color: "secondary.900"
        hover_background: "secondary.200"
        focus_ring: "secondary.500"
      
      outline:
        background: "transparent"
        color: "primary.600"
        border: "primary.500"
        hover_background: "primary.50"
      
      ghost:
        background: "transparent"
        color: "secondary.700"
        hover_background: "secondary.100"
    
    sizes:
      sm:
        padding: "sm md"
        font_size: "sm"
        height: "2rem"
      
      md:
        padding: "md lg" 
        font_size: "base"
        height: "2.5rem"
      
      lg:
        padding: "lg xl"
        font_size: "lg"  
        height: "3rem"
  
  card:
    variants:
      default:
        background: "white"
        border: "secondary.200"
        shadow: "sm"
        radius: "lg"
      
      elevated:
        background: "white"
        shadow: "lg"
        radius: "xl"
      
      outlined:
        background: "transparent"
        border: "secondary.300"
        radius: "lg"

# Animation & Transitions
animations:
  durations:
    fast: "150ms"
    normal: "300ms" 
    slow: "500ms"
  
  easings:
    ease_in: "cubic-bezier(0.4, 0, 1, 1)"
    ease_out: "cubic-bezier(0, 0, 0.2, 1)"
    ease_in_out: "cubic-bezier(0.4, 0, 0.2, 1)"
  
  transitions:
    colors: "color 150ms ease-in-out, background-color 150ms ease-in-out"
    transform: "transform 300ms ease-in-out"
    opacity: "opacity 200ms ease-in-out"