# UI Component: Live Timeline
# Bottom section showing real-time event stream across all pipelines

name: LiveTimeline
type: component
category: visualization

description: "Real-time event stream visualization like Temporal but cleaner, like GitHub Actions but simpler"

props:
  # Data Configuration
  organization_id:
    type: uuid
    required: true
    description: "Organization context"
    
  selected_pipeline_id:
    type: uuid
    nullable: true
    description: "Highlight events for specific pipeline"
    
  # Display Configuration
  max_events:
    type: integer
    default: 200
    description: "Maximum events to show"
    
  time_range:
    type: enum
    values: ["1h", "6h", "24h", "7d"]
    default: "6h"
    description: "Time range to display"
    
  group_by_pipeline:
    type: boolean
    default: true
    description: "Group events by pipeline for cleaner view"
    
  auto_scroll:
    type: boolean
    default: true
    description: "Auto-scroll to newest events"
    
  # Filtering
  event_filters:
    type: object
    default: { severity: ["info", "success", "warning", "error", "critical"] }
    schema:
      properties:
        event_types: { type: array, items: { type: string } }
        severity: { type: array, items: { type: string } }
        show_system_events: { type: boolean, default: false }
        show_completed_tasks: { type: boolean, default: true }
        
  # Performance
  virtual_scrolling:
    type: boolean
    default: true
    description: "Enable virtual scrolling for hundreds of events"

# Data Sources
data_sources:
  timeline_events:
    api: "/api/timeline/events"
    method: "GET"
    params:
      organization_id: "{{ organization_id }}"
      time_range: "{{ time_range }}"
      limit: "{{ max_events }}"
      filters: "{{ event_filters }}"
    websocket: "/ws/timeline"
    real_time: true

# Layout Structure
layout:
  container: "flex flex-col h-full bg-gray-50"
  sections:
    header: "h-12 border-b border-gray-200 bg-white px-4 flex items-center justify-between"
    timeline: "flex-1 overflow-hidden"
    footer: "h-8 border-t border-gray-200 bg-white px-4 flex items-center justify-between text-xs text-gray-500"

# Timeline Structure
timeline_structure:
  # Main timeline container
  container: "relative h-full overflow-y-auto scrollbar-thin scrollbar-thumb-gray-300"
  
  # Timeline axis (vertical line)
  axis: "absolute left-8 top-0 bottom-0 w-0.5 bg-gray-300"
  
  # Event groups (when group_by_pipeline = true)
  event_groups: "space-y-6 p-4"
  
  # Individual events
  events: "space-y-2"

# Components
components:
  # Header controls
  timeline_header:
    component: "TimelineHeader"
    props:
      time_range: "{{ time_range }}"
      filters: "{{ event_filters }}"
      total_events: "{{ timeline_events.length }}"
      
  # Main timeline
  timeline_view:
    component: "VirtualTimeline"
    condition: "virtual_scrolling"
    props:
      events: "{{ grouped_events }}"
      selected_pipeline: "{{ selected_pipeline_id }}"
      
  simple_timeline:
    component: "SimpleTimeline"
    condition: "!virtual_scrolling"
    props:
      events: "{{ grouped_events }}"
      selected_pipeline: "{{ selected_pipeline_id }}"
      
  # Footer stats
  timeline_footer:
    component: "TimelineFooter"
    props:
      events_shown: "{{ timeline_events.length }}"
      last_update: "{{ last_update_time }}"

# Event Group Component (for pipelines)
event_group:
  name: "EventGroup"
  props:
    pipeline: { type: object, required: true }
    events: { type: array, required: true }
    selected: { type: boolean, default: false }
    
  layout: |
    <div className={`relative mb-8 ${selected ? 'ring-2 ring-blue-500 ring-opacity-50 rounded-lg p-2' : ''}`}>
      <!-- Pipeline Header -->
      <div className="flex items-center mb-4 ml-16">
        <div className="flex items-center space-x-3 bg-white rounded-lg shadow-sm border px-4 py-2">
          <PipelineIcon status={pipeline.status} />
          <div>
            <h4 className="text-sm font-semibold text-gray-900">
              {pipeline.name}
            </h4>
            <p className="text-xs text-gray-600">
              {pipeline.tasks_completed} of {pipeline.tasks_total} tasks • 
              {pipeline.progress_percentage}% complete
            </p>
          </div>
          <div className="ml-auto">
            <ProgressRing 
              progress={pipeline.progress_percentage} 
              size="sm"
            />
          </div>
        </div>
      </div>
      
      <!-- Events in this pipeline -->
      <div className="space-y-3">
        {events.map(event => (
          <TimelineEvent 
            key={event.id}
            event={event}
            pipeline_selected={selected}
          />
        ))}
      </div>
    </div>

# Timeline Event Component
timeline_event:
  name: "TimelineEvent"
  props:
    event: { type: object, required: true }
    pipeline_selected: { type: boolean, default: false }
    
  layout: |
    <div className={`relative flex items-start ${getEventSpacing(event)}`}>
      <!-- Timeline dot -->
      <div className="relative flex items-center justify-center">
        <div className={`w-3 h-3 rounded-full border-2 bg-white ${getEventDotColor(event.severity)}`}>
          {event.is_milestone && (
            <div className="absolute inset-0 animate-ping rounded-full bg-blue-400 opacity-75" />
          )}
        </div>
      </div>
      
      <!-- Event content -->
      <div className={`ml-6 flex-1 ${getEventContentStyles(event)}`}>
        <!-- Event card -->
        <div className={`bg-white rounded-lg shadow-sm border p-3 ${
          event.requires_attention ? 'ring-2 ring-orange-500 ring-opacity-50' : ''
        }`}>
          <!-- Header -->
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center space-x-2">
              <EventIcon type={event.event_type} severity={event.severity} />
              <span className="text-sm font-medium text-gray-900">
                {event.title}
              </span>
              {event.requires_attention && (
                <span className="px-2 py-1 text-xs bg-orange-100 text-orange-700 rounded-full">
                  Needs Attention
                </span>
              )}
            </div>
            <div className="flex items-center space-x-2 text-xs text-gray-500">
              <RelativeTime timestamp={event.occurred_at} />
              {event.actor && (
                <ActorBadge actor={event.actor} />
              )}
            </div>
          </div>
          
          <!-- Description -->
          {event.description && (
            <p className="text-sm text-gray-600 mb-2">
              {event.description}
            </p>
          )}
          
          <!-- Event Data -->
          {event.event_data && (
            <EventDataViewer 
              data={event.event_data}
              event_type={event.event_type}
            />
          )}
          
          <!-- Actions -->
          {event.requires_attention && (
            <div className="flex items-center justify-end space-x-2 mt-3 pt-2 border-t">
              <button className="text-xs bg-orange-100 hover:bg-orange-200 text-orange-700 px-3 py-1 rounded-full">
                Review
              </button>
              <button className="text-xs bg-gray-100 hover:bg-gray-200 text-gray-700 px-3 py-1 rounded-full">
                Ignore
              </button>
            </div>
          )}
        </div>
        
        <!-- Parallel indicator -->
        {event.parallel_events && event.parallel_events.length > 0 && (
          <div className="mt-2 ml-4">
            <ParallelEventsIndicator events={event.parallel_events} />
          </div>
        )}
      </div>
    </div>

# Event Data Viewer Component
event_data_viewer:
  name: "EventDataViewer"
  props:
    data: { type: object, required: true }
    event_type: { type: string, required: true }
    
  layout: |
    <div className="mt-2 text-xs">
      {/* Task Progress */}
      {event_type === 'task_progress' && (
        <div className="flex items-center space-x-2">
          <span className="text-gray-600">Progress:</span>
          <ProgressBar 
            value={data.progress_percentage} 
            size="sm"
            className="flex-1 max-w-24"
          />
          <span className="text-gray-500">{data.progress_percentage}%</span>
        </div>
      )}
      
      {/* Agent Assignment */}
      {event_type === 'task_assigned' && (
        <div className="flex items-center space-x-2">
          <span className="text-gray-600">Agent:</span>
          <AgentBadge agent={data.agent} size="xs" />
          <span className="text-gray-500">
            Est: {data.estimated_duration}
          </span>
        </div>
      )}
      
      {/* Error Details */}
      {event_type === 'task_failed' && (
        <div className="bg-red-50 border border-red-200 rounded p-2 mt-1">
          <div className="text-red-800 font-medium">
            {data.error_type}
          </div>
          <div className="text-red-700 mt-1">
            {data.error_message}
          </div>
          {data.recovery_suggestions && (
            <div className="text-red-600 mt-2 text-xs">
              💡 {data.recovery_suggestions[0]}
            </div>
          )}
        </div>
      )}
      
      {/* Quality Gate */}
      {event_type === 'quality_gate_passed' && (
        <div className="flex items-center space-x-2 text-green-700">
          <CheckCircleIcon size={12} />
          <span>Quality gate passed: {data.gate_name}</span>
        </div>
      )}
      
      {/* Human Approval */}
      {event_type === 'human_approval_required' && (
        <div className="flex items-center space-x-2 text-orange-700">
          <UserIcon size={12} />
          <span>Review required for: {data.task_name}</span>
        </div>
      )}
    </div>

# Parallel Events Indicator
parallel_events_indicator:
  name: "ParallelEventsIndicator"
  props:
    events: { type: array, required: true }
    
  layout: |
    <div className="flex items-center space-x-1 text-xs text-purple-600">
      <ParallelIcon size={12} />
      <span>{events.length} parallel tasks</span>
      <div className="flex space-x-1 ml-2">
        {events.slice(0, 3).map(event => (
          <div 
            key={event.id}
            className="w-2 h-2 rounded-full bg-purple-400"
          />
        ))}
        {events.length > 3 && (
          <span className="text-purple-500">+{events.length - 3}</span>
        )}
      </div>
    </div>

# Real-time Updates & Animations
real_time:
  websocket_events:
    - event: "timeline.new_event"
      action: "prepend_event"
      animation: "slide_in_from_top"
      sound: "subtle_notification"
      
    - event: "task.status_changed"
      action: "update_event_status"
      animation: "status_pulse"
      
    - event: "pipeline.completed"
      action: "celebration_sequence"
      animation: "confetti_burst"
      
    - event: "task.blocked" 
      action: "highlight_attention_required"
      animation: "urgent_pulse"
      color: "orange"
      
  # Auto-scroll behavior
  auto_scroll:
    trigger_on: ["timeline.new_event", "task.status_changed"]
    smooth_scroll: true
    scroll_speed: "normal"
    pause_on_user_scroll: true
    resume_delay: 3000  # 3 seconds

# Performance Optimizations
performance:
  virtual_scrolling:
    item_height: 120  # Average event height
    overscan: 10      # Render extra items outside view
    
  event_grouping:
    max_events_per_group: 50
    collapse_old_groups: true
    auto_expand_current: true
    
  update_throttling:
    websocket_updates: 100  # ms
    scroll_updates: 16      # 60fps
    
  lazy_loading:
    load_more_threshold: "80%"  # Load when 80% scrolled
    batch_size: 50

# Styling & Themes
styling:
  # Event severity colors
  severity_colors:
    info: "border-blue-300 bg-blue-50"
    success: "border-green-300 bg-green-50" 
    warning: "border-yellow-300 bg-yellow-50"
    error: "border-red-300 bg-red-50"
    critical: "border-red-500 bg-red-100 animate-pulse"
    
  # Event dot colors  
  dot_colors:
    info: "border-blue-500"
    success: "border-green-500"
    warning: "border-yellow-500" 
    error: "border-red-500"
    critical: "border-red-600 shadow-lg"
    
  # Timeline axis
  axis_styles:
    default: "bg-gray-300"
    active_pipeline: "bg-blue-500 shadow-sm"
    
# Accessibility
accessibility:
  role: "log"
  aria_label: "Live timeline of platform events"
  aria_live: "polite"
  
  keyboard_navigation:
    - key: "j"
      action: "next_event"
    - key: "k" 
      action: "previous_event"
    - key: "Space"
      action: "pause_auto_scroll"
    - key: "r"
      action: "refresh_timeline"
      
  screen_reader:
    announce_new_events: true
    announce_status_changes: true
    group_similar_events: true

# Events & Interactions
events:
  on_event_click:
    description: "Show event details"
    payload: { event_id: "uuid", event: "object" }
    
  on_pipeline_select:
    description: "Filter timeline by pipeline"
    payload: { pipeline_id: "uuid" }
    
  on_filter_change:
    description: "Update timeline filters"
    payload: { filters: "object" }
    
  on_attention_action:
    description: "Handle attention-required events"
    payload: { event_id: "uuid", action: "string" }

# Footer Stats Component
timeline_footer:
  name: "TimelineFooter"
  props:
    events_shown: { type: number, required: true }
    last_update: { type: string, required: true }
    
  layout: |
    <div className="flex items-center justify-between text-xs text-gray-500">
      <div className="flex items-center space-x-4">
        <span>{events_shown} events shown</span>
        <span>•</span>
        <span>Last update: <RelativeTime timestamp={last_update} /></span>
        <span>•</span>
        <ConnectionStatus />
      </div>
      
      <div className="flex items-center space-x-2">
        <button className="hover:text-gray-700">
          Export Timeline
        </button>
        <span>•</span>
        <button className="hover:text-gray-700">
          Clear Filters
        </button>
      </div>
    </div>