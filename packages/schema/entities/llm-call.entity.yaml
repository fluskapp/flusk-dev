name: LLMCall
description: A single LLM API call with cost tracking and deduplication
storage: [sqlite]

fields:
  provider:
    type: string
    required: true
    description: LLM provider name (e.g., openai, anthropic, cohere)
    min: 1

  model:
    type: string
    required: true
    index: true
    description: Model identifier (e.g., gpt-4, claude-3-opus)
    min: 1

  prompt:
    type: string
    required: true
    description: Full prompt text sent to the LLM

  promptHash:
    type: string
    required: true
    index: true
    description: SHA-256 hash of the prompt for deduplication
    min: 64
    max: 64

  tokens:
    type: json
    required: true
    description: Token usage object (input, output, total)
    default: "{}"

  cost:
    type: number
    required: true
    description: Calculated cost in USD for this API call
    min: 0
    default: 0

  response:
    type: string
    required: true
    description: Full response text from the LLM
    default: ""

  cached:
    type: boolean
    required: true
    description: Whether this response was served from cache
    default: false

  status:
    type: string
    required: true
    description: Call status (ok or error)
    default: "ok"

  errorMessage:
    type: string
    description: Error message if the call failed
    default: ""

  agentLabel:
    type: string
    description: Agent label for multi-agent tracking

  organizationId:
    type: string
    description: Organization ID for GDPR data portability and deletion
    min: 1

  consentGiven:
    type: boolean
    required: true
    description: GDPR consent flag
    default: true

  consentPurpose:
    type: string
    required: true
    description: Purpose of data processing (optimization, analytics, training)
    default: "optimization"

  sessionId:
    type: string
    description: Analysis session ID for filtering results by run
    index: true

  conversationId:
    type: string
    description: Conversation ID for multi-turn tracking
    index: true

capabilities:
  crud: true
  aggregation: true
  time-range: true

queries:
  - name: findByPromptHash
    description: Find most recent LLM call by prompt hash (cache lookup)
    params:
      hash: { type: string }
    where: "prompt_hash = :hash"
    order: "created_at DESC"
    limit: 1
    returns: single

  - name: countDuplicates
    description: Count LLM calls sharing prompt_hash with others
    type: raw-sql
    sql: |
      SELECT COALESCE(SUM(cnt), 0) as total FROM (
        SELECT COUNT(*) as cnt FROM llm_calls
        GROUP BY prompt_hash HAVING COUNT(*) > 1
      )
    returns: scalar

  - name: countByModel
    description: Count LLM calls grouped by model
    type: raw-sql
    sql: "SELECT model, COUNT(*) as count FROM llm_calls GROUP BY model ORDER BY count DESC"
    returns: raw

  - name: sumCost
    description: Sum total cost of all LLM calls
    type: raw-sql
    sql: "SELECT COALESCE(SUM(cost), 0) as total FROM llm_calls"
    returns: scalar

  - name: sumCostSince
    description: Sum cost of LLM calls since a given date
    params:
      since: { type: string }
    type: raw-sql
    sql: "SELECT COALESCE(SUM(cost), 0) as total FROM llm_calls WHERE created_at >= :since"
    returns: scalar

  - name: listBySessionId
    description: List LLM calls filtered by session ID
    params:
      sessionId: { type: string }
    where: "session_id = :sessionId"
    order: "created_at DESC"
    returns: list

  - name: sumCostBySessionId
    description: Sum total cost of LLM calls for a specific session
    params:
      sessionId: { type: string }
    type: raw-sql
    sql: "SELECT COALESCE(SUM(cost), 0) as total FROM llm_calls WHERE session_id = :sessionId"
    returns: scalar

  - name: listByConversationId
    description: List LLM calls filtered by conversation ID
    params:
      conversationId: { type: string }
    where: "conversation_id = :conversationId"
    order: "created_at ASC"
    returns: list

  - name: countByModelBySessionId
    description: Count LLM calls grouped by model for a specific session
    params:
      sessionId: { type: string }
    type: raw-sql
    sql: "SELECT model, COUNT(*) as count FROM llm_calls WHERE session_id = :sessionId GROUP BY model ORDER BY count DESC"
    returns: raw
