name: formatDuration
namespace: time
description: Format a duration in milliseconds to a human-readable string
pure: true
generic: false

input:
  ms: { type: number, description: "Duration in milliseconds" }

output:
  type: string
  description: "Human-readable duration (e.g. '1.2s', '300ms', '2m 30s')"

body: |
  (() => {
    if (ms < 1000) return `${ms}ms`;
    if (ms < 60000) return `${(ms / 1000).toFixed(1)}s`;
    const minutes = Math.floor(ms / 60000);
    const seconds = Math.round((ms % 60000) / 1000);
    return seconds > 0 ? `${minutes}m ${seconds}s` : `${minutes}m`;
  })()

tests:
  - name: milliseconds
    input: { ms: 300 }
    expected: "300ms"
  - name: seconds
    input: { ms: 1500 }
    expected: "1.5s"
  - name: minutes and seconds
    input: { ms: 150000 }
    expected: "2m 30s"
  - name: exact minutes
    input: { ms: 120000 }
    expected: "2m"
