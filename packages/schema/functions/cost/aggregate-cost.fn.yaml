name: aggregateCost
namespace: cost
description: Aggregate total cost from an array of individual call costs
pure: true
generic: false

input:
  costs: { type: "number[]", description: "Array of individual costs in USD" }

output:
  type: "{ total: number; count: number; average: number; min: number; max: number }"
  description: "Aggregated cost statistics"

body: |
  costs.length === 0
    ? { total: 0, count: 0, average: 0, min: 0, max: 0 }
    : {
        total: costs.reduce((a, b) => a + b, 0),
        count: costs.length,
        average: costs.reduce((a, b) => a + b, 0) / costs.length,
        min: Math.min(...costs),
        max: Math.max(...costs),
      }

tests:
  - name: multiple costs
    input: { costs: [1.0, 2.0, 3.0] }
    expected: { total: 6, count: 3, average: 2, min: 1, max: 3 }
  - name: empty array
    input: { costs: [] }
    expected: { total: 0, count: 0, average: 0, min: 0, max: 0 }
  - name: single cost
    input: { costs: [5.0] }
    expected: { total: 5, count: 1, average: 5, min: 5, max: 5 }
