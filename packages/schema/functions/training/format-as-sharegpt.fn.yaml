name: formatAsSharegpt
namespace: training
description: Format a training pair as ShareGPT format for fine-tuning
pure: true
generic: false

input:
  prompt: { type: string, description: "User prompt" }
  completion: { type: string, description: "Assistant completion" }
  systemPrompt: { type: string, description: "System prompt or empty" }

output:
  type: string
  description: "JSON string in ShareGPT format"

body: |
  (() => {
    const conversations: Array<{ from: string; value: string }> = [];
    if (systemPrompt) conversations.push({ from: 'system', value: systemPrompt });
    conversations.push({ from: 'human', value: prompt });
    conversations.push({ from: 'gpt', value: completion });
    return JSON.stringify({ conversations });
  })()

tests:
  - name: formats with system
    input:
      prompt: "What is ML?"
      completion: "ML is machine learning."
      systemPrompt: "Be concise."
    expected: '{"conversations":[{"from":"system","value":"Be concise."},{"from":"human","value":"What is ML?"},{"from":"gpt","value":"ML is machine learning."}]}'
  - name: formats without system
    input:
      prompt: "Hi"
      completion: "Hello"
      systemPrompt: ""
    expected: '{"conversations":[{"from":"human","value":"Hi"},{"from":"gpt","value":"Hello"}]}'
