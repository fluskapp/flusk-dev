# Pipeline: Aggregate cost summary for a session
name: costSummary
namespace: analytics
description: Calculate cost breakdown by model for an analysis session
package: business-logic

input:
  calls:
    type: LLMCallEntity[]
    description: Array of LLM calls to summarize

output:
  type: CostSummary
  fields:
    totalCost: { type: number, description: Total cost in USD }
    callCount: { type: number, description: Total number of calls }
    byModel: { type: "Record<string, { count: number; cost: number }>", description: Cost grouped by model }
    avgCostPerCall: { type: number, description: Average cost per call }

steps:
  - id: total-cost
    fn: primitives.cost.aggregateCost
    args:
      items: $input.calls
      field: costUsd
    output: totalCost

  - id: call-count
    expr: "$input.calls.length"
    output: callCount

  - id: group-models
    fn: primitives.collection.groupBy
    args:
      items: $input.calls
      key: model
    output: modelGroups

  - id: by-model
    expr: |
      Object.fromEntries(
        [...$modelGroups.entries()].map(([model, items]) => [
          model,
          { count: items.length, cost: items.reduce((s, c) => s + (c.costUsd ?? 0), 0) }
        ])
      )
    output: byModel

  - id: avg-cost
    expr: "$callCount > 0 ? $totalCost / $callCount : 0"
    output: avgCostPerCall

  - id: return
    value:
      totalCost: $totalCost
      callCount: $callCount
      byModel: $byModel
      avgCostPerCall: $avgCostPerCall

tests:
  - name: empty calls
    input:
      calls: []
    expected:
      totalCost: 0
      callCount: 0
      byModel: {}
      avgCostPerCall: 0
