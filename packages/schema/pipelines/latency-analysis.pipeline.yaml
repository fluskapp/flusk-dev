# Pipeline: Analyze latency patterns across LLM calls
name: latencyAnalysis
namespace: analytics
description: Compute latency stats per model and identify slow outliers
package: business-logic

input:
  calls:
    type: LLMCallEntity[]
    description: Array of LLM calls with timing data

output:
  type: LatencyReport
  fields:
    avgLatencyMs: { type: number, description: Average latency across all calls }
    p95LatencyMs: { type: number, description: 95th percentile latency }
    slowestCalls: { type: "SlowCall[]", description: Top 5 slowest calls }
    byModel: { type: "Record<string, ModelLatency>", description: Latency stats per model }

steps:
  - id: extract-latencies
    expr: "$input.calls.map(c => c.durationMs ?? 0).filter(d => d > 0)"
    output: latencies

  - id: sorted-latencies
    expr: "[...$latencies].sort((a, b) => a - b)"
    output: sorted

  - id: avg-latency
    expr: "$latencies.length > 0 ? $latencies.reduce((s, d) => s + d, 0) / $latencies.length : 0"
    output: avgLatencyMs

  - id: p95-latency
    expr: "$sorted.length > 0 ? $sorted[Math.floor($sorted.length * 0.95)] : 0"
    output: p95LatencyMs

  - id: slowest-calls
    expr: |
      [...$input.calls]
        .filter(c => (c.durationMs ?? 0) > 0)
        .sort((a, b) => (b.durationMs ?? 0) - (a.durationMs ?? 0))
        .slice(0, 5)
        .map(c => ({
          model: c.model,
          durationMs: c.durationMs ?? 0,
          tokens: c.tokens?.total ?? 0,
          prompt: (c.prompt ?? '').slice(0, 80),
        }))
    output: slowestCalls

  - id: by-model
    expr: |
      (() => {
        const groups = {};
        for (const c of $input.calls) {
          if (!groups[c.model]) groups[c.model] = [];
          groups[c.model].push(c);
        }
        return Object.fromEntries(
          Object.entries(groups).map(([model, items]) => {
            const durations = items.map(c => c.durationMs ?? 0).filter(d => d > 0);
            const avg = durations.length > 0 ? durations.reduce((s, d) => s + d, 0) / durations.length : 0;
            const s = [...durations].sort((a, b) => a - b);
            const p95 = s.length > 0 ? s[Math.floor(s.length * 0.95)] : 0;
            return [model, { avg, p95, count: items.length, min: s[0] ?? 0, max: s[s.length - 1] ?? 0 }];
          })
        );
      })()
    output: byModel

  - id: return
    value:
      avgLatencyMs: $avgLatencyMs
      p95LatencyMs: $p95LatencyMs
      slowestCalls: $slowestCalls
      byModel: $byModel

tests:
  - name: empty calls
    input:
      calls: []
    expected:
      avgLatencyMs: 0
      p95LatencyMs: 0
      slowestCalls: []
      byModel: {}
