# Docker Compose configuration for flusk
# Generated by @flusk/cli
#
# Services:
# - PostgreSQL 16 with pgvector extension
# - Redis 7 with persistence
# - Adminer (PostgreSQL UI) - http://localhost:8080
# - RedisInsight (Redis UI) - http://localhost:8001
#
# Usage:
#   docker compose up -d      # Start all services
#   docker compose down       # Stop all services
#   docker compose logs -f    # View logs

version: '3.9'

services:
  # PostgreSQL 16 with pgvector extension
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ${COMPOSE_PROJECT_NAME:-flusk}-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-flusk}
      POSTGRES_USER: ${POSTGRES_USER:-flusk}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev_password_change_me}
      POSTGRES_INITDB_ARGS: "-E UTF8"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-flusk} -d ${POSTGRES_DB:-flusk}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - flusk_network

  # Redis 7 with persistence
  redis:
    image: redis:7-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-flusk}-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - flusk_network

  # Adminer - PostgreSQL Web UI
  adminer:
    image: adminer:latest
    container_name: ${COMPOSE_PROJECT_NAME:-flusk}-adminer
    restart: unless-stopped
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: nette
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - flusk_network

  # RedisInsight - Redis Web UI
  redisinsight:
    image: redislabs/redisinsight:latest
    container_name: ${COMPOSE_PROJECT_NAME:-flusk}-redisinsight
    restart: unless-stopped
    ports:
      - "${REDISINSIGHT_PORT:-8001}:8001"
    volumes:
      - redisinsight_data:/db
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - flusk_network

# Persistent volumes
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  redisinsight_data:
    driver: local

# Internal network
networks:
  flusk_network:
    driver: bridge
