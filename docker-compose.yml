# Docker Compose configuration for flusk
# SQLite-only — no external database services needed
#
# Usage:
#   docker compose up -d      # Start the app
#   docker compose down       # Stop the app
#   docker compose logs -f    # View logs

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-flusk}-app
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3000}
      FLUSK_API_KEY: ${FLUSK_API_KEY}
      FLUSK_HMAC_SECRET: ${FLUSK_HMAC_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - flusk_data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r => process.exit(r.ok ? 0 : 1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  flusk_data:
    driver: local
