name: Deploy to GCP Cloud Run
on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_ID: flusk-prod # שנה לפרויקט שלך
  SERVICE_NAME: flusk-backend
  REGION: us-central1

jobs:
  deploy:
    if: ${{ vars.ENABLE_GCP_DEPLOY == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Build project
        run: pnpm build
      
      - name: Run tests
        run: pnpm test
      
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          project_id: ${{ env.PROJECT_ID }}
      
      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          version: latest
      
      - name: Configure Docker for GCR
        run: gcloud auth configure-docker
      
      - name: Build Docker image
        run: |
          docker build -t gcr.io/$PROJECT_ID/$SERVICE_NAME:$GITHUB_SHA .
          docker build -t gcr.io/$PROJECT_ID/$SERVICE_NAME:latest .
      
      - name: Push Docker image
        run: |
          docker push gcr.io/$PROJECT_ID/$SERVICE_NAME:$GITHUB_SHA
          docker push gcr.io/$PROJECT_ID/$SERVICE_NAME:latest
      
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE_NAME \
            --image gcr.io/$PROJECT_ID/$SERVICE_NAME:$GITHUB_SHA \
            --region $REGION \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars="NODE_ENV=production" \
            --set-env-vars="PORT=8080" \
            --set-env-vars="FLUSK_API_KEY=${{ secrets.FLUSK_API_KEY }}" \
            --set-env-vars="FLUSK_HMAC_SECRET=${{ secrets.FLUSK_HMAC_SECRET }}" \
            --set-env-vars="ENCRYPTION_KEY=${{ secrets.ENCRYPTION_KEY }}" \
            --memory=512Mi \
            --cpu=1000m \
            --min-instances=0 \
            --max-instances=10 \
            --timeout=300 \
            --port=8080
      
      - name: Get service URL
        run: |
          URL=$(gcloud run services describe $SERVICE_NAME --region $REGION --format 'value(status.url)')
          echo "🚀 Deployment successful!"
          echo "🌐 Service URL: $URL"
          echo "💚 Health check: $URL/health"