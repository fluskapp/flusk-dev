name: Generator Guard
on: [pull_request]
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - run: pnpm exec tsx packages/cli/bin/flusk.ts validate-generated --strict
        # Fails PR if generated files are stale or hand-edited
