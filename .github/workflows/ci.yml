name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm exec tsx packages/cli/bin/flusk.ts validate-generated --strict
      - run: pnpm exec tsx packages/cli/bin/flusk.ts guard
      - run: pnpm exec tsx scripts/qa-validate.ts
