name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - run: pnpm lint
      - name: Check generated files
        run: pnpm exec tsx scripts/check-generated.ts
      - run: pnpm build
      - run: pnpm test:coverage
      - name: Coverage Summary
        if: always()
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            node -e "const s=JSON.parse(require('fs').readFileSync('coverage/coverage-summary.json','utf8')); console.log('Lines:', s.total.lines.pct + '%', 'Branches:', s.total.branches.pct + '%')"
          else
            echo "Coverage summary not available"
          fi
      - name: Generator ratio
        if: always()
        run: |
          total=$(find packages -name "*.ts" -o -name "*.tsx" | grep -v node_modules | grep -v dist | grep -v "packages/forge" | grep -v "packages/schema" | wc -l)
          gen=$(find packages -name "*.ts" -o -name "*.tsx" | grep -v node_modules | grep -v dist | grep -v "packages/forge" | grep -v "packages/schema" | xargs grep -l "BEGIN GENERATED" 2>/dev/null | wc -l)
          echo "Generator ratio: $gen/$total ($(( gen * 100 / total ))%)"
      - run: pnpm exec tsx scripts/qa-validate.ts
