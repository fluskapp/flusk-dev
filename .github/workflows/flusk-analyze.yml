name: Flusk Cost Analysis
on:
  pull_request:
    paths: ['packages/**/*.ts', 'server.ts', '*.ts', '*.js']

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      # TODO: Add proper Flusk analysis action when available
      - name: Placeholder Cost Analysis
        run: |
          echo "🔍 Flusk Cost Analysis would run here"
          echo "Target: server.ts and packages/"
          echo "Budget: $100"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
