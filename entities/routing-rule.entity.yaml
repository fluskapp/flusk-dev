name: RoutingRule
description: Model routing rules per organization - routes to cheapest qualifying model
storage: [postgres]

fields:
  organizationId:
    type: string
    required: true
    min: 1
    index: true
    description: Organization that owns this routing rule

  name:
    type: string
    required: true
    min: 1
    description: Human-readable name for this routing rule

  qualityThreshold:
    type: number
    required: true
    min: 0
    max: 1
    description: Minimum quality score (0-1) required for routed model

  fallbackModel:
    type: string
    required: true
    min: 1
    description: Model to use when no cheaper model meets threshold

  enabled:
    type: boolean
    required: true
    default: false
    description: Whether this routing rule is active

capabilities:
  crud: true

queries:
  - name: findByOrganization
    description: Find all routing rules for an organization
    params:
      orgId: { type: string }
    where: "organization_id = :orgId"
    returns: list
