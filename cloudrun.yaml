apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: flusk-backend
  namespace: default
  labels:
    cloud.googleapis.com/location: us-central1
  annotations:
    run.googleapis.com/launch-stage: GA
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      labels:
        app: flusk-backend
        version: latest
      annotations:
        autoscaling.knative.dev/maxScale: "10"
        autoscaling.knative.dev/minScale: "0"
        run.googleapis.com/cpu-throttling: "true"
        run.googleapis.com/execution-environment: gen2
    spec:
      containerConcurrency: 1000
      timeoutSeconds: 300
      serviceAccountName: flusk-backend@PROJECT_ID.iam.gserviceaccount.com
      containers:
        - name: flusk-backend
          image: gcr.io/PROJECT_ID/flusk-backend:latest
          ports:
            - name: http1
              containerPort: 8080
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "8080"
            - name: HOST
              value: "0.0.0.0"
            - name: FLUSK_API_KEY
              valueFrom:
                secretKeyRef:
                  name: flusk-secrets
                  key: api_key
            - name: FLUSK_HMAC_SECRET
              valueFrom:
                secretKeyRef:
                  name: flusk-secrets
                  key: hmac_secret
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: flusk-secrets
                  key: encryption_key
          resources:
            limits:
              cpu: 1000m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 3
  traffic:
    - percent: 100
      latestRevision: true