services:
  flusk:
    build: .
    container_name: flusk-server
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgresql://flusk:${POSTGRES_PASSWORD}@postgres:5432/flusk
      REDIS_URL: redis://redis:6379
      PORT: "3000"
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - flusk_network

  postgres:
    image: pgvector/pgvector:pg16
    container_name: flusk-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: flusk
      POSTGRES_USER: flusk
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flusk -d flusk"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - flusk_network

  redis:
    image: redis:7-alpine
    container_name: flusk-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - flusk_network

volumes:
  postgres_data:
  redis_data:

networks:
  flusk_network:
    driver: bridge
