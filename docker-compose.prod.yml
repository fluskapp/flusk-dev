services:
  flusk:
    build: .
    container_name: flusk-server
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      PORT: "3000"
      NODE_ENV: production
      FLUSK_API_KEY: ${FLUSK_API_KEY}
      FLUSK_HMAC_SECRET: ${FLUSK_HMAC_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
    volumes:
      - flusk_data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r => process.exit(r.ok ? 0 : 1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  flusk_data:
    driver: local
